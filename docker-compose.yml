services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - DB_PATH=/data/irrigation.db
    volumes:
      - backend-data:/data
    depends_on:
      - mosquitto
    restart: unless-stopped

volumes:
  mosquitto-data:
  backend-data:

# Produktionskonfig: auth + ACL, TLS mot enheterna.
# Lokal dev kör utan Docker (tools/run_broker.py) och rörs inte av detta.

allow_anonymous false
password_file /mqtt-auth/passwd
acl_file /mosquitto/config/acl

# Internt i compose-nätet (backend ansluter hit). Porten publiceras ALDRIG
# i docker-compose — inga "ports:" för 1883.
listener 1883

# Publikt för enheterna: TLS med Lets Encrypt-certet som entrypoint.sh
# kopierar från Caddys volym (enheterna validerar inte certkedjan, men
# trafiken är krypterad — se planens MQTT-TLS-beslut).
listener 8883
certfile /mosquitto/certs/cert.pem
keyfile /mosquitto/certs/key.pem

# Persistens gör att retained devices/{id}/.../status överlever omstart.
persistence true
persistence_location /mosquitto/data/
